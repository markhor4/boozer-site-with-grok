<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boozer (BoozCoin) - Solana Meme Coin</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Comic Sans MS', 'Bubblegum Sans', sans-serif;
            background-color: #000;
            color: #fff;
        }
        /* Banner Section */
        .banner {
            position: relative;
            width: 100%;
            padding-bottom: 60.49%; /* 1084/1792 ≈ 0.6049 (aspect ratio) */
            height: 0;
            overflow: hidden;
        }
        .banner img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Ensures entire image is visible */
        }
        /* Buttons Below Banner */
        .banner-buttons {
            text-align: center;
            padding: 20px 0;
            background-color: #FFC107; /* Yellow */
        }
        .banner-buttons a {
            display: inline-block;
            margin: 0 10px;
            padding: 10px 20px;
            background-color: #FF5722; /* Orange */
            color: #fff;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
            transition: transform 0.3s;
        }
        .banner-buttons a:hover {
            transform: scale(1.1);
        }
        /* Responsive Design */
        @media (max-width: 768px) {
            .banner-buttons a {
                display: block;
                margin: 10px auto;
                width: 80%;
            }
        }
    </style>
</head>
<body>
    <!-- Banner Section -->
    <section class="banner">
        <img src="boozer-banner.png" alt="Boozer Banner - Solana’s Tipsiest Meme Coin">
    </section>
    <!-- Buttons Below Banner -->
    <div class="banner-buttons">
        <a href="#airdrop">Join Airdrop</a>
        <a href="#presale">Buy BOOZ Now</a>
    </div>

    <!-- Other sections will go here -->
</body>
</html>
